<header class="eventify-header" [class.eventify-header--solid]="!shouldUseHomeHeaderStyle()">
  <nav #headerNavRoot class="navbar navbar-expand-lg container eventify-header__nav">
    <a class="eventify-header__brand" routerLink="/" (click)="onNavItemClick()">
      <img src="images/logo.png" alt="Eventify" class="eventify-header__brand-logo" />
    </a>

    <button
      #headerTogglerRef
      class="navbar-toggler eventify-header__toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainHeaderNav"
      aria-controls="mainHeaderNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="eventify-header__toggler-lines" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>

    <div
      #mainHeaderNavRef
      id="mainHeaderNav"
      class="collapse navbar-collapse eventify-header__collapse"
      (hide.bs.collapse)="onMainHeaderNavCollapsed()"
      (hidden.bs.collapse)="onMainHeaderNavCollapsed()"
    >
      <app-header-nav-links
        [links]="navLinks"
        [isSolidStyle]="!shouldUseHomeHeaderStyle()"
        (navigate)="onNavItemClick()"
      />

      @if (!isLoggedIn()) {
        <div class="eventify-header__actions">
          <app-button
            label="Login"
            variant="ghost"
            size="md"
            [rounded]="true"
            customClass="eventify-header__login-btn laser-sweep-hover"
            [routerLink]="'/login'"
            (click)="onNavItemClick()"
          ></app-button>
          <app-button
            label="Get Started"
            variant="primary"
            size="md"
            [rounded]="true"
            customClass="eventify-header__cta-btn diagonal-swipe-hover"
            [routerLink]="'/register'"
            (click)="onNavItemClick()"
          ></app-button>
        </div>
      } @else {
        <div class="position-relative eventify-header__actions">
          <app-header-user-menu
            [displayName]="getDisplayName()"
            [displayEmail]="getDisplayEmail()"
            [profileImageUrl]="getProfileImageUrl()"
            [isOpen]="isProfileMenuOpen()"
            [isSolidStyle]="!shouldUseHomeHeaderStyle()"
            (toggle)="toggleProfileMenu()"
            (close)="closeProfileMenu()"
            (navigate)="onNavItemClick()"
            (logout)="logout()"
          />
        </div>
      }
    </div>
  </nav>
</header>
