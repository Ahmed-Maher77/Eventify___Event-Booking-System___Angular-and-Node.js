<header class="eventify-header">
  <nav #headerNavRoot class="navbar navbar-expand-lg container eventify-header__nav">
    <a class="eventify-header__brand" routerLink="/" (click)="onNavItemClick()">
      <img src="images/logo.png" alt="Eventify" class="eventify-header__brand-logo" />
    </a>

    <button
      #headerTogglerRef
      class="navbar-toggler eventify-header__toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainHeaderNav"
      aria-controls="mainHeaderNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="eventify-header__toggler-lines" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>

    <div #mainHeaderNavRef id="mainHeaderNav" class="collapse navbar-collapse eventify-header__collapse">
      <ul class="navbar-nav eventify-header__nav-list">
        @for (link of navLinks; track link.route) {
          <li class="nav-item">
            <a
              class="eventify-header__nav-link"
              routerLinkActive="active"
              [routerLink]="link.route"
              (click)="onNavItemClick()"
            >
              {{ link.label }}
            </a>
          </li>
        }
      </ul>

      @if (!isLoggedIn()) {
        <div class="eventify-header__actions">
          <app-button
            label="Login"
            variant="ghost"
            size="md"
            [rounded]="true"
            customClass="eventify-header__login-btn laser-sweep-hover"
            [routerLink]="'/login'"
            (click)="onNavItemClick()"
          ></app-button>
          <app-button
            label="Get Started"
            variant="primary"
            size="md"
            [rounded]="true"
            customClass="eventify-header__cta-btn diagonal-swipe-hover"
            [routerLink]="'/register'"
            (click)="onNavItemClick()"
          ></app-button>
        </div>
      } @else {
        <div class="position-relative eventify-header__actions">
          <button
            class="header-pill-btn eventify-header__profile-btn"
            type="button"
            (click)="toggleProfileMenu()"
          >
            <img [src]="profileImageUrl" alt="Profile" class="header-avatar" />
            <span>Profile</span>
          </button>
          @if (isProfileMenuOpen()) {
            <ul class="dropdown-menu dropdown-menu-end show mt-2">
              <li><a class="dropdown-item" routerLink="/profile" (click)="onNavItemClick()">My Profile</a></li>
              <li><a class="dropdown-item" routerLink="/bookings" (click)="onNavItemClick()">My Bookings</a></li>
              <button class="dropdown-item" (click)="logout()">Logout</button>
            </ul>
          }
        </div>
      }
    </div>
  </nav>
</header>
