<aside
  class="admin-sidebar"
  [class.admin-sidebar--collapsed]="isCollapsed()"
  [class.admin-sidebar--mobile-open]="adminMobileSidebar.isDrawerOpen()"
>
  <div class="admin-sidebar__head">
    <div class="admin-sidebar__brand">
      <span class="admin-sidebar__brand-icon" aria-hidden="true">
        <i class="fa-solid fa-shield-halved"></i>
      </span>
      @if (!isCollapsed()) {
        <div>
          <p class="admin-sidebar__brand-title">Control Center</p>
          <p class="admin-sidebar__brand-subtitle">Eventify Admin</p>
        </div>
      }
    </div>

    <button
      type="button"
      class="admin-sidebar__collapse-btn"
      [attr.aria-label]="collapseButtonAriaLabel()"
      (click)="onCollapseButtonClick()"
    >
      <i [class]="collapseButtonIconClass()" aria-hidden="true"></i>
    </button>
  </div>

  <nav class="admin-sidebar__nav">
    @for (item of navItems; track item.route) {
      <a
        class="admin-sidebar__nav-item"
        [routerLink]="item.route"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
      >
        <i [class]="item.icon + ' admin-sidebar__nav-icon'" aria-hidden="true"></i>
        @if (!isCollapsed()) {
          <span>{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <div class="admin-sidebar__bottom">
    <app-button
      [label]="isCollapsed() ? '' : 'Add New Event'"
      variant="primary"
      size="md"
      [fullWidth]="true"
      [rounded]="true"
      leftIcon="fa-solid fa-plus"
      customClass="admin-sidebar__cta diagonal-swipe-hover"
      (pressed)="openAddEventModal()"
    />
    <app-button
      [label]="isCollapsed() ? '' : 'Logout'"
      variant="ghost"
      size="md"
      [fullWidth]="true"
      [rounded]="true"
      rightIcon="fa-solid fa-right-from-bracket"
      customClass="admin-sidebar__logout-btn diagonal-swipe-hover"
      (pressed)="logout()"
    />
  </div>
</aside>
