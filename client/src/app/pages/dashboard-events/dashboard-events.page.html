<section class="admin-entity-page">
  <header class="admin-entity-page__header d-flex justify-content-between align-items-start gap-3 flex-wrap">
    <app-highlighted-page-heading
      titlePrefix="Event"
      titleHighlight="Catalog"
      subtitle="Manage publishing, updates, and lifecycle across all events."
      headingLevel="h2"
      containerClass="admin-heading--container"
      titleClass="admin-heading--title"
      subtitleClass="admin-heading--subtitle"
    />
    <app-button
      label="Add Event"
      variant="primary"
      size="md"
      [rounded]="true"
      leftIcon="fa-solid fa-plus"
      customClass="admin-entity-page__primary-btn diagonal-swipe-hover"
    />
  </header>

  <div class="admin-entity-page__panel table-responsive">
    <table class="table admin-entity-page__table align-middle mb-0">
      <thead>
        <tr>
          <th>Event</th>
          <th>Date</th>
          <th>Status</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Annual Product Summit</td>
          <td>Oct 24, 2026</td>
          <td><span class="admin-entity-page__pill">Upcoming</span></td>
          <td class="text-end">
            <button type="button" class="admin-entity-page__icon-btn" aria-label="View event"><i class="fa-regular fa-eye"></i></button>
            <button type="button" class="admin-entity-page__icon-btn" aria-label="Edit event"><i class="fa-regular fa-pen-to-square"></i></button>
            <button type="button" class="admin-entity-page__icon-btn is-danger" aria-label="Delete event"><i class="fa-regular fa-trash-can"></i></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
