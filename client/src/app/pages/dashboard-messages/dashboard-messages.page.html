<section class="admin-stream">
  <header>
    <app-highlighted-page-heading
      titlePrefix="Message"
      titleHighlight="Center"
      subtitle="Prioritize incoming conversations and team responses."
      headingLevel="h2"
      containerClass="admin-heading--container"
      titleClass="admin-heading--title"
      subtitleClass="admin-heading--subtitle"
    />
  </header>

  <div class="admin-stream__panel">
    @if (isLoading()) {
      <div class="admin-page__loader-wrap">
        <app-section-loader [size]="36" label="Loading message center" />
      </div>
    } @else {
      @for (item of pagedItems(); track item.id) {
        <article class="admin-stream__item">
          <p class="admin-stream__from">From: {{ item.from }}</p>
          <p class="admin-stream__subject">{{ item.subject }}</p>
          <p class="admin-stream__meta">{{ item.meta }}</p>
        </article>
      }

      <app-admin-entity-pagination
        [currentPage]="listPage()"
        [totalPages]="listTotalPages()"
        [totalItems]="totalListItems()"
        itemLabel="messages"
        ariaLabel="Message center pagination"
        (pageChange)="onListPageChange($event)"
      />
    }
  </div>
</section>
