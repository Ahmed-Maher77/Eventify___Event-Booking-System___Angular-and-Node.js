<section class="admin-page">
  <header class="admin-page__header d-flex align-items-start justify-content-between gap-3 flex-wrap">
    <app-highlighted-page-heading
      titlePrefix="Performance"
      titleHighlight="Insights"
      subtitle="Track platform health, activity trends, and report snapshots."
      headingLevel="h2"
      containerClass="admin-heading--container"
      titleClass="admin-heading--title"
      subtitleClass="admin-heading--subtitle"
    />
  </header>

  <section class="admin-page__stats row g-3">
    <article class="col-12 col-md-6 col-xl-3">
      <div class="admin-page__panel">
        <p class="admin-page__metric-label">Total Revenue</p>
        <p class="admin-page__metric-value">$24.8K</p>
      </div>
    </article>
    <article class="col-12 col-md-6 col-xl-3">
      <div class="admin-page__panel">
        <p class="admin-page__metric-label">Active Users</p>
        <p class="admin-page__metric-value">1,942</p>
      </div>
    </article>
    <article class="col-12 col-md-6 col-xl-3">
      <div class="admin-page__panel">
        <p class="admin-page__metric-label">Open Messages</p>
        <p class="admin-page__metric-value">37</p>
      </div>
    </article>
    <article class="col-12 col-md-6 col-xl-3">
      <div class="admin-page__panel">
        <p class="admin-page__metric-label">New Subscriptions</p>
        <p class="admin-page__metric-value">214</p>
      </div>
    </article>
  </section>

  <section class="admin-page__grid row g-3 mt-1">
    <article class="col-12 col-xl-7">
      <div class="admin-page__panel admin-page__panel--min">
        <h2 class="admin-page__section-title">Traffic Trend</h2>
        <p class="admin-page__placeholder">Connect your analytics source to render real-time charts.</p>
      </div>
    </article>
    <article class="col-12 col-xl-5">
      <div class="admin-page__panel admin-page__panel--min">
        <h2 class="admin-page__section-title">Recent Reports</h2>
        <ul class="admin-page__list">
          <li>Weekly bookings summary</li>
          <li>Audience growth report</li>
          <li>Support response timing</li>
        </ul>
      </div>
    </article>
  </section>
</section>
