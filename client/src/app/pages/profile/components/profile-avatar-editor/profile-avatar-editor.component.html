<div class="profile-page__avatar">
  <img
    class="profile-page__avatar-image"
    [class.is-loading]="busy"
    [src]="imageUrl"
    [alt]="altText"
  />
  @if (busy) {
    <span class="profile-page__avatar-loader" aria-label="Uploading profile image" role="status">
      <span class="profile-page__avatar-loader-spinner" aria-hidden="true"></span>
    </span>
  }
  <label
    class="profile-page__avatar-edit-btn"
    for="profile-avatar-file"
    [class.is-disabled]="busy"
    [attr.aria-disabled]="busy"
    [attr.title]="busy ? 'Uploading...' : 'Change profile image'"
  >
    <i class="fa-solid fa-pen" aria-hidden="true"></i>
    <span class="visually-hidden">Change profile image</span>
  </label>
  <input
    id="profile-avatar-file"
    type="file"
    class="profile-page__avatar-file-input"
    accept="image/png,image/jpeg,image/jpg,image/webp"
    [disabled]="busy"
    (change)="onFileInputChange($event)"
  />
</div>
