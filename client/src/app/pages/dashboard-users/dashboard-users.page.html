<section class="admin-directory">
  <header>
    <app-highlighted-page-heading
      titlePrefix="Member"
      titleHighlight="Directory"
      subtitle="Review user accounts, roles, and registration activity."
      headingLevel="h2"
      containerClass="admin-heading--container"
      titleClass="admin-heading--title"
      subtitleClass="admin-heading--subtitle"
    />
  </header>

  <div class="admin-directory__panel table-responsive">
    @if (isLoading()) {
      <div class="admin-page__loader-wrap">
        <app-section-loader [size]="36" label="Loading member directory" />
      </div>
    } @else {
      <table class="table align-middle mb-0">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody>
          @for (row of pagedRows(); track row.id) {
            <tr>
              <td>{{ row.name }}</td>
              <td>{{ row.email }}</td>
              <td>
                <span class="admin-directory__pill">{{ row.role }}</span>
              </td>
              <td>{{ row.joined }}</td>
            </tr>
          }
        </tbody>
      </table>

      <app-admin-entity-pagination
        [currentPage]="listPage()"
        [totalPages]="listTotalPages()"
        [totalItems]="totalListItems()"
        itemLabel="members"
        ariaLabel="Member directory pagination"
        (pageChange)="onListPageChange($event)"
      />
    }
  </div>
</section>
