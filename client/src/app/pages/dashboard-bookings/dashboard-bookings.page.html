<section class="admin-entity-page">
  <header class="admin-entity-page__header">
    <app-highlighted-page-heading
      titlePrefix="Booking"
      titleHighlight="Operations"
      subtitle="Monitor reservation activity and fulfillment outcomes."
      headingLevel="h2"
      containerClass="admin-heading--container"
      titleClass="admin-heading--title"
      subtitleClass="admin-heading--subtitle"
    />
  </header>

  <div class="admin-entity-page__panel table-responsive">
    @if (isLoading()) {
      <div class="admin-page__loader-wrap">
        <app-section-loader [size]="36" label="Loading booking operations" />
      </div>
    } @else {
      <table class="table admin-entity-page__table align-middle mb-0">
        <thead>
          <tr>
            <th>Booking ID</th>
            <th>Customer</th>
            <th>Status</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (row of pagedRows(); track row.id) {
            <tr>
              <td>{{ row.id }}</td>
              <td>{{ row.customer }}</td>
              <td>
                <span class="admin-entity-page__pill">{{ row.status }}</span>
              </td>
              <td class="text-end">
                <button type="button" class="admin-entity-page__icon-btn" aria-label="View booking">
                  <i class="fa-regular fa-eye" aria-hidden="true"></i>
                </button>
                <button type="button" class="admin-entity-page__icon-btn" aria-label="Edit booking">
                  <i class="fa-regular fa-pen-to-square" aria-hidden="true"></i>
                </button>
                <button type="button" class="admin-entity-page__icon-btn is-danger" aria-label="Delete booking">
                  <i class="fa-regular fa-trash-can" aria-hidden="true"></i>
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>

      <app-admin-entity-pagination
        [currentPage]="listPage()"
        [totalPages]="listTotalPages()"
        [totalItems]="totalListItems()"
        itemLabel="bookings"
        ariaLabel="Booking operations pagination"
        (pageChange)="onListPageChange($event)"
      />
    }
  </div>
</section>
