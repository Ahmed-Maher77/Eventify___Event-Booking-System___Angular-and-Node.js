<section class="static-info-page">
  <div class="container static-info-page__container">
    <app-highlighted-page-heading
      titlePrefix="My"
      titleHighlight="Bookings"
      subtitle="Track your reservations, review upcoming events, and access your booking history."
      titleClass="static-info-page__title"
      subtitleClass="static-info-page__subtitle"
    />
    @if (isLoading()) {
      <div class="bookings-page__loader-wrap">
        <app-loader [size]="40" label="Loading bookings" />
      </div>
    }
  </div>
</section>
