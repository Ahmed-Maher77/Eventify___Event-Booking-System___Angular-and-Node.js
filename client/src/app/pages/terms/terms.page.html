<section #termsPageRoot class="static-info-page">
  <div class="container static-info-page__container">
    <app-policy-landing
      class="policy-page__animate"
      badgeIconClass="fa-solid fa-scale-balanced"
      titlePrefix="Terms &"
      titleHighlight="Conditions"
      subtitle="Read the core rules for account usage, bookings, and secure participation on the Eventify platform."
      backgroundVariant="flipped"
    />

    <app-policy-panel-switcher ariaLabel="Terms sections" [panels]="panels" />

    <app-policy-info-cards
      class="policy-page__animate"
      sectionTitle="Limitations and Updates"
      [cards]="summaryCards"
    />
  </div>
</section>
